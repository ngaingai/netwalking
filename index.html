<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport"
            content="width=device-width, initial-scale=1.0">
      <title>Event Series</title>
      <style>
            body {
                  font-family: 'Arial', sans-serif;
                  text-align: center;
                  margin: 0;
                  padding: 20px;
                  background-color: #14213d;
                  color: #ffffff;
            }

            .container {
                  max-width: 700px;
                  margin: auto;
                  padding: 30px;
                  background: #3590F3;
                  border-radius: 12px;
                  box-shadow: 0px 6px 15px rgba(0, 0, 0, 0.25);
                  transition: transform 0.2s;
            }

            .container:hover {
                  transform: scale(1.02);
            }

            h1,
            h2 {
                  color: #ffffff;
                  margin-bottom: 15px;
            }

            .event {
                  margin: 20px 0;
                  padding: 20px;
                  border-radius: 8px;
                  background-color: #4cccc3;
                  color: #14213d;
                  box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
                  transition: transform 0.2s, box-shadow 0.2s;
            }

            .event:hover {
                  transform: translateY(-5px);
                  box-shadow: 0px 6px 12px rgba(0, 0, 0, 0.3);
            }

            .event a {
                  display: inline-block;
                  margin-top: 10px;
                  padding: 10px 15px;
                  background: #14213d;
                  color: #ffffff;
                  border-radius: 5px;
                  font-weight: bold;
                  text-decoration: none;
                  transition: background 0.2s, transform 0.2s;
            }

            .event a:hover {
                  background: #ffffff;
                  color: #14213d;
                  transform: scale(1.05);
            }

            .footer {
                  margin-top: 20px;
                  font-size: 0.9em;
                  opacity: 0.8;
            }
      </style>
      <script>
            async function loadEvents() {
                  try {
                        const response = await fetch('events.json');
                        const events = await response.json();

                        if (events.nextEvent) {
                              document.getElementById('next-event').innerHTML = `
                        <h2>Next Event</h2>
                        <div class="event">
                            <p><strong>${events.nextEvent.name}</strong></p>
                            <p>${events.nextEvent.date}</p>
                            <a href="${events.nextEvent.link}" target="_blank">Event Details</a>
                        </div>`;
                        } else {
                              document.getElementById('next-event').innerHTML = "<p>No upcoming events.</p>";
                        }

                        let pastEventsHtml = "";
                        events.previousEvents.forEach(event => {
                              pastEventsHtml += `
                        <div class="event">
                            <p><strong>${event.name}</strong></p>
                            <p>${event.date}</p>
                        </div>`;
                        });
                        document.getElementById('previous-events').innerHTML = pastEventsHtml;
                  } catch (error) {
                        document.getElementById('next-event').innerHTML = "<p>Unable to load events.</p>";
                  }
            }
            window.onload = loadEvents;
      </script>
</head>

<body>
      <div class="container">
            <h1>Welcome to Our Event Series</h1>
            <p>Bringing people together for great conversations.</p>

            <div id="next-event">
                  <p>Loading next event...</p>
            </div>

            <h2>Previous Events</h2>
            <div id="previous-events">
                  <p>Loading previous events...</p>
            </div>
      </div>

      <p class="footer">&copy; 2025 Event Series. All rights reserved.</p>
</body>

</html>
