<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport"
            content="width=device-width, initial-scale=1.0">
      <title>Event Series</title>
      <style>
            body {
                  font-family: Arial, sans-serif;
                  text-align: center;
                  margin: 50px;
                  background-color: #14213d;
                  color: #ffffff;
            }

            .container {
                  max-width: 600px;
                  margin: auto;
                  padding: 20px;
                  background: #3590F3;
                  border-radius: 10px;
                  box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            }

            h1,
            h2 {
                  color: #ffffff;
            }

            .event {
                  margin: 20px 0;
                  padding: 15px;
                  border-radius: 5px;
                  background-color: #4cccc3;
                  color: #14213d;
                  box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.2);
            }

            a {
                  color: #ffffff;
                  text-decoration: none;
                  font-weight: bold;
            }

            a:hover {
                  text-decoration: underline;
            }
      </style>
      <script>
            async function loadEvents() {
                  try {
                        const response = await fetch('events.json');
                        const events = await response.json();

                        if (events.nextEvent) {
                              document.getElementById('next-event').innerHTML = `
                        <h2>Next Event</h2>
                        <div class="event">
                            <p><strong>${events.nextEvent.name}</strong></p>
                            <p>${events.nextEvent.date}</p>
                            <p><a href="${events.nextEvent.link}" target="_blank">Event Details</a></p>
                        </div>`;
                        } else {
                              document.getElementById('next-event').innerHTML = "<p>No upcoming events.</p>";
                        }

                        let pastEventsHtml = "";
                        events.previousEvents.forEach(event => {
                              pastEventsHtml += `
                        <div class="event">
                            <p><strong>${event.name}</strong></p>
                            <p>${event.date}</p>
                        </div>`;
                        });
                        document.getElementById('previous-events').innerHTML = pastEventsHtml;
                  } catch (error) {
                        document.getElementById('next-event').innerHTML = "<p>Unable to load events.</p>";
                  }
            }
            window.onload = loadEvents;
      </script>
</head>

<body>
      <div class="container">
            <h1>Welcome to Our Event Series</h1>
            <p>Bringing people together for great conversations.</p>

            <div id="next-event">
                  <p>Loading next event...</p>
            </div>

            <h2>Previous Events</h2>
            <div id="previous-events">
                  <p>Loading previous events...</p>
            </div>
      </div>
</body>
